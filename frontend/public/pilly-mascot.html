<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pilly — Animated Mascot</title>
    <style>
      /* ===========================================================
         PILLY — animated pharmacy mascot
         Pure CSS keyframe animations, no JavaScript.
         Component root: .pilly-stage (400 x 400, scalable)
         =========================================================== */

      .pilly-stage {
        position: relative;
        width: 400px;
        height: 400px;
        background: #ffffff;
        overflow: hidden;
        border-radius: 24px; /* optional — remove for a bare component */
      }

      /* ---------- EDGE BLOBS (4 rounded rectangles at the corners) ---------- */
      .pilly-blob {
        position: absolute;
        width: 150px;
        height: 150px;
        border-radius: 48px;
        background: #40e0d0;
        opacity: 0.85;
        z-index: 1;
        will-change: transform;
      }
      .pilly-blob--tl {
        top: -62px;
        left: -52px;
        animation: pilly-blob-left 3s ease-in-out infinite alternate;
      }
      .pilly-blob--bl {
        bottom: -58px;
        left: -56px;
        animation: pilly-blob-left 3s ease-in-out infinite alternate;
      }
      .pilly-blob--tr {
        top: -54px;
        right: -56px;
        animation: pilly-blob-right 3s ease-in-out infinite alternate;
      }
      .pilly-blob--br {
        bottom: -52px;
        right: -52px;
        animation: pilly-blob-right 3s ease-in-out infinite alternate;
      }

      /* Left pair: -12px -> +12px.  Right pair: opposite phase (+12 -> -12). */
      @keyframes pilly-blob-left {
        from {
          transform: translateX(-12px);
        }
        to {
          transform: translateX(12px);
        }
      }
      @keyframes pilly-blob-right {
        from {
          transform: translateX(12px);
        }
        to {
          transform: translateX(-12px);
        }
      }

      /* ---------- ORBITING CIRCLES (two dots, 180° apart) ---------- */
      .pilly-orbit {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        z-index: 2;
        animation: pilly-orbit 6s linear infinite;
        will-change: transform;
      }
      .pilly-dot {
        position: absolute;
        top: 0;
        left: 0;
        border-radius: 50%;
        background: #40e0d0;
        will-change: transform;
      }
      /* Centre each dot on the orbit origin, then push it out by the radius. */
      .pilly-dot--small {
        width: 30px;
        height: 30px;
        margin: -15px 0 0 -15px;
        transform: translateX(120px); /* one side */
      }
      .pilly-dot--medium {
        width: 55px;
        height: 55px;
        margin: -27.5px 0 0 -27.5px;
        transform: translateX(-120px); /* opposite side -> 180° apart */
      }
      @keyframes pilly-orbit {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* ---------- CENTRE PILL (float + breathing glow) ---------- */
      .pilly-pill {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 220px;
        height: 220px;
        margin: -110px 0 0 -110px;
        z-index: 3;
        transform-origin: 50% 50%;
        animation:
          pilly-float 3s ease-in-out infinite alternate,
          pilly-breathe 3s ease-in-out infinite;
        will-change: transform, filter;
      }

      /* Gentle vertical bob + slight rotation wiggle */
      @keyframes pilly-float {
        from {
          transform: translateY(-8px) rotate(-3deg);
        }
        to {
          transform: translateY(8px) rotate(3deg);
        }
      }

      /* Breathing glow — drop-shadow follows the pill's silhouette
         (used instead of box-shadow so the glow hugs the capsule
         shape rather than its rectangular bounding box). */
      @keyframes pilly-breathe {
        0%,
        100% {
          filter: drop-shadow(0 8px 10px rgba(26, 74, 74, 0.18))
            drop-shadow(0 0 6px rgba(64, 224, 208, 0.35));
        }
        50% {
          filter: drop-shadow(0 12px 16px rgba(26, 74, 74, 0.26))
            drop-shadow(0 0 20px rgba(64, 224, 208, 0.75));
        }
      }

      /* Respect users who prefer less motion */
      @media (prefers-reduced-motion: reduce) {
        .pilly-blob,
        .pilly-orbit,
        .pilly-pill {
          animation: none;
        }
      }

      /* demo page only */
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f8f9;
      }
    </style>
  </head>
  <body>
    <!-- =======================================================
         REUSABLE COMPONENT — copy from <div class="pilly-stage"> down
         ======================================================= -->
    <div class="pilly-stage" role="img" aria-label="Pilly pharmacy mascot">
      <!-- Edge blobs -->
      <span class="pilly-blob pilly-blob--tl"></span>
      <span class="pilly-blob pilly-blob--tr"></span>
      <span class="pilly-blob pilly-blob--bl"></span>
      <span class="pilly-blob pilly-blob--br"></span>

      <!-- Orbiting circles (both ride one rotating wrapper, 180° apart) -->
      <div class="pilly-orbit">
        <span class="pilly-dot pilly-dot--small"></span>
        <span class="pilly-dot pilly-dot--medium"></span>
      </div>

      <!-- Centre capsule -->
      <svg
        class="pilly-pill"
        viewBox="0 0 200 200"
        xmlns="http://www.w3.org/2000/svg"
      >
        <defs>
          <!-- Turquoise body with depth -->
          <linearGradient id="pilly-turq" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#6cf3e6" />
            <stop offset="55%" stop-color="#40e0d0" />
            <stop offset="100%" stop-color="#28c4b5" />
          </linearGradient>
          <!-- White / light-grey half -->
          <linearGradient id="pilly-white" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#ffffff" />
            <stop offset="100%" stop-color="#e6ecee" />
          </linearGradient>
          <!-- Soft round gloss (white half) -->
          <radialGradient id="pilly-gloss-r" cx="50%" cy="50%" r="50%">
            <stop offset="0" stop-color="#ffffff" stop-opacity="0.9" />
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
          </radialGradient>
          <!-- Vertical gloss streak (turquoise half) -->
          <linearGradient id="pilly-gloss-v" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ffffff" stop-opacity="0.95" />
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
          </linearGradient>
        </defs>

        <!-- Tilt the whole capsule ~45° (bottom-left -> top-right) -->
        <g transform="rotate(-45 100 100)">
          <!-- White sticker base sits slightly larger than the body -->
          <rect x="34" y="64" width="132" height="72" rx="36" fill="#ffffff" />

          <!-- Coloured halves, clipped to the capsule outline -->
          <clipPath id="pilly-clip">
            <rect x="42" y="72" width="116" height="56" rx="28" />
          </clipPath>
          <g clip-path="url(#pilly-clip)">
            <rect x="42" y="72" width="58" height="56" fill="url(#pilly-turq)" />
            <rect
              x="100"
              y="72"
              width="58"
              height="56"
              fill="url(#pilly-white)"
            />

            <!-- Gloss on the white half -->
            <ellipse cx="124" cy="86" rx="28" ry="13" fill="url(#pilly-gloss-r)" />
            <!-- Gloss swoosh + sparkle on the turquoise half -->
            <ellipse
              cx="60"
              cy="112"
              rx="9"
              ry="19"
              transform="rotate(18 60 112)"
              fill="url(#pilly-gloss-v)"
            />
            <circle cx="67" cy="100" r="4" fill="#ffffff" opacity="0.85" />
          </g>

          <!-- Seam between the two halves -->
          <line
            x1="100"
            y1="74"
            x2="100"
            y2="126"
            stroke="#1a4a4a"
            stroke-width="4"
            stroke-linecap="round"
          />

          <!-- Dark-teal capsule outline -->
          <rect
            x="42"
            y="72"
            width="116"
            height="56"
            rx="28"
            fill="none"
            stroke="#1a4a4a"
            stroke-width="5"
          />
        </g>
      </svg>
    </div>
  </body>
</html>
